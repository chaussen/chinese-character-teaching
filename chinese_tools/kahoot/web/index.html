<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Kahoot Quiz Generator</title>
    <style>
      :root {
        --ink: #1c2430;
        --muted: #6b7785;
        --line: #e2e6ea;
        --accent: #6c5aa6;
        --bg: #f7f8fa;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font: 16px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 460px;
        width: 100%;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 40px 36px;
        text-align: center;
        box-shadow: 0 12px 40px rgba(28, 36, 48, 0.06);
      }
      .glyph {
        font: 600 44px/1 "PingFang SC", "Microsoft YaHei", serif;
        color: var(--accent);
        margin-bottom: 18px;
      }
      h1 { margin: 0 0 10px; font-size: 22px; }
      h1 .han { color: var(--accent); }
      p { margin: 0; color: var(--muted); font-size: 15px; }
      code {
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 2px 6px;
        font-size: 13.5px;
      }
      .tag {
        display: inline-block;
        margin-bottom: 20px;
        padding: 5px 12px;
        border-radius: 999px;
        background: #ede6f0;
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="glyph">题</div>
      <span class="tag">Command-line tool</span>
      <h1>Kahoot Quiz Generator <span class="han">题库生成</span></h1>
      <p>This is a local Python tool, not a browser app. It bulk-generates
        Kahoot-importable quiz spreadsheets from class vocabulary lists.
        Run it from the repo: <code>chinese_tools/kahoot</code>.</p>
    </main>
  </body>
</html>
