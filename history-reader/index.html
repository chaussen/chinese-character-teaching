<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#B23A2B" />
  <title>史案 · 史书知识图谱阅读器</title>
  <meta name="description" content="史案 — turn the dynastic histories into a navigable knowledge graph. A side-by-side close-reader for classical Chinese history: proper nouns, grammar, geography, relationships, and careers, decoded on demand." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg:#EFE7D6; --panel:#F4ECDA; --card:#FBF6EC; --line:#E2D8C2; --line-soft:#EAE0CB;
      --ink:#221D16; --ink-2:#3A332A; --ink-3:#5B5142; --muted:#7A6F5C; --faint:#A99C84;
      --accent:#B23A2B; --accent-soft:#E9C7C1;
      --c-person:#B23A2B; --c-place:#2C7A70; --c-office:#3F6B8C; --c-era:#B26B00; --c-rank:#6C5AA6;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;height:100%;}
    body{
      background:var(--bg); color:var(--ink);
      font-family:Manrope,system-ui,-apple-system,"Segoe UI",sans-serif;
      -webkit-font-smoothing:antialiased; overflow:hidden;
    }
    .serif{font-family:"Noto Serif SC",serif;}
    .news{font-family:Newsreader,serif;}
    button{font-family:inherit;}
    ::selection{background:rgba(178,58,43,.16);}
    @keyframes shiIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
    @keyframes shiCard{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
    .sc::-webkit-scrollbar{width:9px;height:9px;}
    .sc::-webkit-scrollbar-thumb{background:#D9CDB4;border-radius:9px;}
    .sc::-webkit-scrollbar-track{background:transparent;}

    #app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

    /* ───── toolbar ───── */
    .bar{
      display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;
      padding:9px clamp(14px,3vw,32px);min-height:58px;
      background:rgba(251,246,236,.92);backdrop-filter:saturate(150%) blur(12px);
      -webkit-backdrop-filter:saturate(150%) blur(12px);border-bottom:1px solid var(--line);z-index:5;
    }
    .brand{display:flex;align-items:center;gap:11px;flex-shrink:0;}
    .seal{
      width:33px;height:33px;border-radius:9px;background:var(--accent);color:#fff;
      display:inline-flex;align-items:center;justify-content:center;
      font-family:"Noto Serif SC",serif;font-weight:700;font-size:18px;
      box-shadow:0 10px 20px -10px rgba(178,58,43,.7);flex-shrink:0;
    }
    .brand .t1{font-family:"Noto Serif SC",serif;font-weight:600;font-size:16px;line-height:1.1;}
    .brand .t2{font-size:11px;color:var(--faint);font-weight:600;letter-spacing:.02em;}
    .picker{font-family:"Noto Serif SC",serif;font-size:11.5px;font-weight:600;color:var(--ink-3);background:var(--card);border:1px solid var(--line);border-radius:7px;padding:2px 6px;cursor:pointer;max-width:46vw;}
    .picker:hover{border-color:#D9B3AC;}
    .spacer{flex:1;}
    .grp{display:flex;align-items:center;gap:7px;}
    .grp-label{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;}
    .divider{width:1px;height:22px;background:var(--line);}

    .toggle{
      display:inline-flex;align-items:center;gap:8px;cursor:pointer;
      font-weight:700;font-size:13px;padding:8px 14px;border-radius:999px;transition:.15s;
      background:transparent;color:var(--muted);border:1px solid #DCD0B8;
    }
    .toggle .led{width:8px;height:8px;border-radius:50%;background:#C3B79C;display:inline-block;}
    .toggle.sq .led{border-radius:2px;}
    .toggle.on{background:var(--card);}
    .toggle.on.lang{color:var(--c-era);border-color:#E3D2AC;}      .toggle.on.lang .led{background:var(--c-era);}
    .toggle.on.know{color:var(--c-place);border-color:#BFD8D2;}    .toggle.on.know .led{background:var(--c-place);}
    .toggle.on.src{color:var(--c-office);border-color:#BCCCDB;}    .toggle.on.src .led{background:var(--c-office);}

    .fbtn{
      width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--card);
      color:var(--ink-3);font-weight:700;cursor:pointer;font-family:"Noto Serif SC",serif;transition:.15s;
    }
    .fbtn:hover{border-color:#D9B3AC;color:var(--accent);}
    .fbtn.sm{font-size:13px;} .fbtn.lg{font-size:17px;}

    .seg{display:inline-flex;background:var(--line-soft);border:1px solid var(--line);border-radius:999px;padding:3px;gap:2px;}
    .seg button{border:none;cursor:pointer;font-weight:700;font-size:13px;padding:6px 15px;border-radius:999px;transition:.15s;background:transparent;color:var(--muted);}
    .seg button.on{background:var(--accent);color:#fff;box-shadow:0 6px 14px -8px rgba(178,58,43,.85);}

    /* ───── body ───── */
    .body{flex:1;display:flex;min-height:0;overflow:hidden;}

    /* left text pane */
    .text-pane{flex:1 1 0;min-width:0;overflow-y:auto;padding:clamp(22px,3.5vw,48px) clamp(18px,4vw,56px);}
    .text-inner{max-width:600px;margin:0 auto;animation:shiIn .35s ease;}
    .title-row{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
    .title-seal{
      width:46px;height:46px;border-radius:10px;background:var(--accent);color:#fff;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      font-family:"Noto Serif SC",serif;font-weight:700;font-size:25px;box-shadow:0 10px 20px -10px rgba(178,58,43,.7);
    }
    .title-row .tt{font-family:"Noto Serif SC",serif;font-weight:600;font-size:25px;letter-spacing:.02em;}
    .title-row .ts{font-size:13px;color:var(--faint);font-weight:600;}
    .intro{font-family:Newsreader,serif;font-size:15.5px;line-height:1.65;color:var(--muted);margin:14px 0 22px;border-left:2px solid var(--line);padding-left:16px;}

    .legend{
      display:flex;flex-wrap:wrap;gap:7px 14px;align-items:center;margin:0 0 22px;padding:10px 14px;
      border:1px solid var(--line);border-radius:11px;background:var(--card);font-size:12.5px;color:var(--muted);
    }
    .legend b{color:var(--ink-3);font-weight:700;}
    .legend .li{display:inline-flex;align-items:center;gap:6px;}
    .legend .sw{font-family:"Noto Serif SC",serif;color:var(--ink);padding-bottom:1px;}

    .prose p{margin:0 0 18px;text-indent:2em;}
    .mark{cursor:pointer;border-radius:5px;padding:0 1px;transition:background .15s ease;-webkit-tap-highlight-color:transparent;color:var(--ink);}
    .mark.sel{font-weight:600;}

    .foot-hint{margin-top:26px;padding-top:16px;border-top:1px solid var(--line);font-family:Newsreader,serif;font-style:italic;font-size:13px;color:var(--faint);line-height:1.6;}

    /* right knowledge panel */
    .panel{flex:0 0 clamp(420px,46%,640px);display:flex;flex-direction:column;min-height:0;border-left:1px solid var(--line);background:var(--panel);}
    .tabs{display:flex;gap:4px;padding:12px clamp(14px,1.6vw,20px) 0;flex-shrink:0;overflow-x:auto;}
    .tab{border:none;cursor:pointer;font-weight:700;font-size:13.5px;white-space:nowrap;padding:9px 15px;border-radius:11px 11px 0 0;transition:.15s;background:transparent;color:var(--muted);}
    .tab .n{opacity:.55;font-weight:600;margin-left:6px;}
    .tab.on{background:var(--card);color:var(--accent);box-shadow:inset 0 2px 0 var(--accent);}
    .panel-body{flex:1;overflow-y:auto;padding:14px clamp(14px,1.6vw,20px) 22px;min-height:0;}

    .view-h{font-family:"Noto Serif SC",serif;font-weight:600;font-size:16px;}
    .view-sub{font-family:Newsreader,serif;font-style:italic;font-size:13px;color:var(--faint);margin:3px 0 16px;}

    /* notes cards */
    .cards{display:flex;flex-direction:column;gap:11px;}
    .ncard{text-align:left;width:100%;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:14px 16px;cursor:pointer;transition:.16s;}
    .ncard .top{display:flex;align-items:center;gap:9px;}
    .chip{flex-shrink:0;font-size:10.5px;font-weight:700;letter-spacing:.06em;color:#fff;border-radius:5px;padding:3px 7px;}
    .ncard .w{font-family:"Noto Serif SC",serif;font-weight:600;font-size:19px;color:var(--ink);letter-spacing:.02em;}
    .seen-hint{margin-left:auto;font-size:11.5px;color:var(--faint);font-weight:600;}
    .unverif{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:.04em;color:#9A6420;background:#F3E6C7;border-radius:5px;padding:2px 7px;}
    .ncard .brief{font-family:"Noto Serif SC",serif;font-size:14.5px;line-height:1.55;color:var(--ink-3);margin-top:8px;}
    .fields{display:flex;flex-direction:column;gap:7px;margin-top:11px;padding-top:10px;border-top:1px solid var(--line);}
    .field{display:flex;gap:10px;align-items:baseline;}
    .field .k{flex-shrink:0;width:2.8em;font-family:"Noto Serif SC",serif;font-size:12.5px;font-weight:600;}
    .field .v{font-family:"Noto Serif SC",serif;font-size:14px;line-height:1.6;color:var(--ink-2);}

    /* timeline (power curve) */
    .ladder{position:relative;display:flex;align-items:flex-end;gap:6px;height:240px;border-left:1px solid var(--line);border-bottom:1px solid var(--line);padding:0 6px 0 8px;margin-top:4px;}
    .rung{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;cursor:pointer;transition:opacity .15s;}
    .rung:hover{opacity:.82;}
    .rung .rt{font-size:11px;color:var(--muted);margin-bottom:4px;text-align:center;font-family:"Noto Serif SC",serif;line-height:1.2;}
    .rung .bar{width:78%;max-width:50px;border:1px solid var(--line);border-bottom:none;border-radius:7px 7px 0 0;background:var(--card);transition:.18s;}
    .rung .ry{font-weight:800;font-size:13px;color:var(--accent);margin-top:5px;}
    .rung .rg{font-size:11px;color:#9A7B2E;}

    /* map */
    .mapbox{position:relative;width:100%;aspect-ratio:4/3.4;border:1px solid var(--line);border-radius:14px;background:repeating-linear-gradient(135deg,#F3EEE2 0 16px,#EEE8DA 16px 32px);overflow:hidden;}
    .mapbox .stub{position:absolute;left:10px;top:9px;font-family:Newsreader,serif;font-style:italic;font-size:11.5px;color:#B0A78F;}
    .pin{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
    .pin .dot{width:25px;height:25px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;background:var(--card);}
    .pin .lab{font-family:"Noto Serif SC",serif;font-weight:600;font-size:13.5px;color:var(--ink-2);background:var(--card);border:1px solid var(--line);border-radius:6px;padding:1px 7px;white-space:nowrap;}
    .pin .lab .mod{color:var(--faint);font-size:11px;font-weight:400;}
    .map-cap{font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.5;}
    .place-note{margin-top:10px;border:1px solid var(--c-era);border-radius:10px;background:#F7F0E2;padding:10px 13px;font-family:"Noto Serif SC",serif;font-size:13.5px;color:var(--ink-3);}
    .place-note b{color:#9A6420;}

    /* relations */
    .relbox{position:relative;width:100%;aspect-ratio:1/0.82;border:1px solid var(--line);border-radius:14px;background:#F3EEE2;overflow:hidden;}
    .rel-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:64px;height:64px;border:2.5px solid var(--accent);border-radius:50%;background:#F8EEEA;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif SC",serif;font-weight:700;font-size:21px;color:var(--accent);}
    .rel-node{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;cursor:pointer;z-index:2;}
    .rel-node .bub{width:56px;height:56px;border-radius:50%;border:2px solid;background:#F3EEE2;display:flex;align-items:center;justify-content:center;font-family:"Noto Serif SC",serif;font-weight:600;font-size:16px;transition:.15s;}
    .rel-node .sub{font-size:11.5px;color:var(--muted);text-align:center;margin-top:3px;max-width:96px;}
    .rel-lab{position:absolute;transform:translate(-50%,-50%);font-size:11.5px;font-weight:700;color:#8A7F66;background:#F3EEE2;padding:1px 6px;border-radius:5px;z-index:1;}

    /* rise list */
    .rise{position:relative;padding-left:26px;}
    .rise .spine{position:absolute;left:6px;top:6px;bottom:14px;width:2px;background:#E0D4BC;}
    .rstep{position:relative;margin-bottom:18px;cursor:pointer;transition:opacity .15s;}
    .rstep:hover{opacity:.8;}
    .rstep .rdot{position:absolute;left:-26px;top:3px;width:14px;height:14px;border-radius:50%;border:3px solid var(--panel);}
    .rstep .rhead{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap;}
    .rstep .ry{font-weight:800;font-size:15px;color:var(--accent);letter-spacing:.02em;}
    .rstep .rtag{font-size:10.5px;font-weight:700;letter-spacing:.06em;color:#9A7B2E;background:#F0E2BC;border-radius:5px;padding:2px 7px;}
    .rstep .rtitle{font-family:"Noto Serif SC",serif;font-weight:600;font-size:16px;margin:5px 0 3px;color:var(--ink);}
    .rstep .rnote{font-family:"Noto Serif SC",serif;font-size:13.5px;line-height:1.6;color:var(--ink-3);}

    /* library */
    .libgroups{display:flex;flex-direction:column;gap:16px;}
    .libgroup .gh{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
    .libgroup .gsw{width:9px;height:9px;border-radius:3px;}
    .libgroup .gl{font-family:"Noto Serif SC",serif;font-weight:600;font-size:15px;color:var(--ink-2);}
    .libgroup .gc{font-weight:700;font-size:12.5px;}
    .libchips{display:flex;flex-wrap:wrap;gap:7px;}
    .libchip{cursor:pointer;font-family:"Noto Serif SC",serif;font-size:14px;font-weight:600;padding:5px 12px;border-radius:999px;background:var(--card);transition:.15s;}

    /* ───── bottom detail dock ───── */
    .dock{flex-shrink:0;border-top:1px solid var(--line);background:var(--card);}
    .dock-empty{height:52px;display:flex;align-items:center;gap:10px;padding:0 clamp(16px,3vw,32px);font-family:Newsreader,serif;font-style:italic;font-size:13.5px;color:var(--faint);}
    .dock-empty .ed{width:7px;height:7px;border-radius:50%;background:#D9CDB4;}
    .dock-card{padding:11px clamp(16px,3vw,32px) 16px;animation:shiCard .25s ease;max-height:42vh;overflow-y:auto;}
    .dock-head{display:flex;align-items:center;gap:11px;flex-wrap:wrap;}
    .dock-head .w{font-family:"Noto Serif SC",serif;font-weight:600;font-size:20px;}
    .dock-head .anchor{font-family:"Noto Serif SC",serif;font-size:14.5px;color:var(--muted);}
    .dock-head .src{margin-left:auto;font-size:12px;color:var(--faint);}
    .dock-head .src .nosrc{color:#9A6420;font-weight:700;}
    .dock-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:6px 28px;margin-top:10px;}
    .dock-gloss{font-family:"Noto Serif SC",serif;font-size:14.5px;line-height:1.65;color:var(--ink-2);margin-top:9px;max-width:80ch;}
    .seealso{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:11px;padding-top:11px;border-top:1px solid var(--line);}
    .seealso .lbl{font-size:12.5px;font-weight:700;color:var(--muted);}
    .xref{font-family:"Noto Serif SC",serif;font-size:12.5px;color:var(--c-office);border:1px solid #BCCCDB;border-radius:999px;padding:2px 10px;cursor:pointer;background:#F1F4F7;transition:.15s;}
    .xref:hover{background:#E6EDF3;}

    /* responsive: stack on narrow screens */
    @media (max-width:860px){
      body{overflow:auto;}
      #app{height:auto;min-height:100dvh;}
      .body{flex-direction:column;overflow:visible;}
      .text-pane{overflow:visible;}
      .panel{flex:none;border-left:none;border-top:1px solid var(--line);}
      .panel-body{overflow:visible;}
      .dock{position:sticky;bottom:0;z-index:6;box-shadow:0 -10px 24px -18px rgba(0,0,0,.5);}
    }
  </style>
</head>
<body>
  <div id="app" class="sc"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
