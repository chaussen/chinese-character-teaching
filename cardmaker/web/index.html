<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Card Maker — Work in Progress</title>
    <style>
      :root {
        --ink: #1c2430;
        --muted: #6b7785;
        --line: #e2e6ea;
        --accent: #b5402f;
        --bg: #f7f8fa;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font: 16px/1.6 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 460px;
        width: 100%;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 40px 36px;
        text-align: center;
        box-shadow: 0 12px 40px rgba(28, 36, 48, 0.06);
      }
      .glyph {
        font: 600 44px/1 "PingFang SC", "Microsoft YaHei", serif;
        color: var(--accent);
        margin-bottom: 18px;
      }
      h1 { margin: 0 0 10px; font-size: 22px; }
      h1 .han { color: var(--accent); }
      p { margin: 0; color: var(--muted); font-size: 15px; }
      .tag {
        display: inline-block;
        margin-bottom: 20px;
        padding: 5px 12px;
        border-radius: 999px;
        background: #fdeee9;
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="glyph">汉字</div>
      <span class="tag">Work in progress</span>
      <h1>Card Maker <span class="han">汉字练习卡</span></h1>
      <p>This tool is being updated and isn't available right now. Please check back soon.</p>
    </main>
  </body>
</html>
