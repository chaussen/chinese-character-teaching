name: Python application

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest Pillow xpinyin
    - name: Lint with flake8
      run: |
        # stop the build on syntax errors or undefined names
        flake8 chinese_tools tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # style report (non-blocking)
        flake8 chinese_tools tests --count --exit-zero --max-complexity=12 --max-line-length=100 --statistics
    - name: Test with pytest
      run: pytest -q
