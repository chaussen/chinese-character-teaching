# Builds the client-side Card Maker web app and publishes it to GitHub Pages.
#
# One-time setup: repo Settings -> Pages -> "Build and deployment" -> Source:
# "GitHub Actions". (Until then this workflow builds but does not change the
# existing Jekyll Pages site.)
name: Deploy Card Maker web app

on:
  push:
    branches: [master]
    paths:
      - "cardmaker/**"
      - ".github/workflows/deploy-cardmaker.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cardmaker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cardmaker/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run web:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: cardmaker/dist-web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
