# Builds and publishes the whole public site to GitHub Pages:
#
#   /            landing / hub                (landing/)
#   /studio/     Character Studio learning app (studio.html + learn/ + audio/)
#   /cardmaker/  Card Maker web app           (built from cardmaker/)
#   /reader/     Classical Reader app         (classical-reader/index.html, self-contained)
#   /history/    史案 History KG Reader        (history-reader/, self-contained)
#
# One-time setup (repo owner): Settings -> Pages -> "Build and deployment" ->
# Source: "GitHub Actions". For the custom domain, also add the DNS record and
# set the custom domain in Settings -> Pages (see the CNAME file written below).
name: Deploy site to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "studio.html"
      - "learn/**"
      - "audio/**"
      - "cardmaker/**"
      - "landing/**"
      - "classical-reader/index.html"
      - "history-reader/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cardmaker/package-lock.json

      - name: Build Card Maker web app
        working-directory: cardmaker
        run: |
          npm ci
          npm run web:build

      - name: Assemble site
        run: |
          set -euo pipefail
          SITE="_site"
          rm -rf "$SITE"
          mkdir -p "$SITE/studio" "$SITE/cardmaker" "$SITE/reader" "$SITE/history"

          # Landing / hub  ->  /
          cp -r landing/. "$SITE"/

          # Character Studio  ->  /studio/   (relative asset paths, self-contained)
          cp studio.html "$SITE/studio/index.html"
          cp -r learn  "$SITE/studio/learn"
          cp -r audio  "$SITE/studio/audio"

          # Card Maker  ->  /cardmaker/   (vite built with relative base)
          cp -r cardmaker/dist-web/. "$SITE/cardmaker/"

          # Classical Reader  ->  /reader/   (single self-contained HTML file)
          cp "classical-reader/index.html" "$SITE/reader/index.html"

          # 史案 History KG Reader  ->  /history/   (self-contained: html + geo.js + app.js + data.js)
          cp history-reader/index.html history-reader/geo.js history-reader/app.js history-reader/data.js "$SITE/history/"

          # Skip Jekyll processing of the artifact.
          touch "$SITE/.nojekyll"

          # Custom domain — disabled while testing on the github.io URL. When the
          # DNS record for studio.caseychinese.org is in place, uncomment this and
          # set the custom domain under Settings -> Pages.
          # echo "studio.caseychinese.org" > "$SITE/CNAME"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
