# Builds and publishes the whole public site to GitHub Pages:
#
#   /                       landing / hub          (landing/) — links only the 3 learning apps
#   /character/             Character Studio       (studio.html + learn/ + audio/)
#   /classical-literature/  Classical Reader       (classical-reader/index.html, self-contained)
#   /history/               史案 History KG Reader  (history-reader/, self-contained)
#
#   /tools/cardmaker/       Card Maker web app     (built from cardmaker/) — not linked from
#   /tools/kahoot/          Kahoot tool info page  (chinese_tools/kahoot/web/)   landing;
#                           reachable only by anyone who already knows the URL.
#
# One-time setup (repo owner): Settings -> Pages -> "Build and deployment" ->
# Source: "GitHub Actions". For the custom domain, also add the DNS record and
# set the custom domain in Settings -> Pages (see the CNAME file written below).
name: Deploy site to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "studio.html"
      - "learn/**"
      - "audio/**"
      - "cardmaker/**"
      - "chinese_tools/kahoot/web/**"
      - "landing/**"
      - "classical-reader/index.html"
      - "history-reader/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cardmaker/package-lock.json

      - name: Build Card Maker web app
        working-directory: cardmaker
        run: |
          npm ci
          npm run web:build

      - name: Assemble site
        run: |
          set -euo pipefail
          SITE="_site"
          rm -rf "$SITE"
          mkdir -p "$SITE/character" "$SITE/classical-literature" "$SITE/history" "$SITE/tools/cardmaker" "$SITE/tools/kahoot"

          # Landing / hub  ->  /
          cp -r landing/. "$SITE"/

          # Character Studio  ->  /character/   (relative asset paths, self-contained)
          cp studio.html "$SITE/character/index.html"
          cp -r learn  "$SITE/character/learn"
          cp -r audio  "$SITE/character/audio"

          # Classical Reader  ->  /classical-literature/   (single self-contained HTML file)
          cp "classical-reader/index.html" "$SITE/classical-literature/index.html"

          # 史案 History KG Reader  ->  /history/   (self-contained: html + geo.js + app.js + data.js)
          cp history-reader/index.html history-reader/geo.js history-reader/app.js history-reader/data.js "$SITE/history/"

          # Card Maker  ->  /tools/cardmaker/   (vite built with relative base; not linked
          # from landing, reachable only if you know the URL)
          cp -r cardmaker/dist-web/. "$SITE/tools/cardmaker/"

          # Kahoot tool  ->  /tools/kahoot/   (info page only — the tool itself is a local CLI)
          cp chinese_tools/kahoot/web/index.html "$SITE/tools/kahoot/index.html"

          # Skip Jekyll processing of the artifact.
          touch "$SITE/.nojekyll"

          # Custom domain — disabled while testing on the github.io URL. When the
          # DNS record for studio.caseychinese.org is in place, uncomment this and
          # set the custom domain under Settings -> Pages.
          # echo "studio.caseychinese.org" > "$SITE/CNAME"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
