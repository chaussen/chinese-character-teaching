const READING_TERM = { duo:'多音字', rare:'生僻字', loan:'通假字', phrase:'连读' };
/* Multi-char terms safe to auto-scan inside prose.  Single chars (铭/说/唐)
 * are glossed explicitly instead, so we never wrap them mid-word. */
const AUTO_KEYS = ['名词用作动词','名词作动词','托物言志','借物喻人','安贫乐道',
  '词类活用','使动用法','宾语前置','判断句','骈句','押韵','对仗','起兴','典故',

/* ──────────────────  TERM RENDER + POPOVER ENGINE  ────────────────── */
const TERM_STYLE='border-bottom:1px dashed #C2A98F;cursor:help;-webkit-tap-highlight-color:transparent;';
function gloss(label,key){
  if(!TERMS[key]) return label;
  return `<span class="wy-term" data-gloss="${esc(key)}" style="${TERM_STYLE}">${label}</span>`;
}
/* Wrap known multi-char terms inside an ALREADY-escaped string.  The scanner
 * advances past whatever it inserts, so it never re-matches its own markup. */
function autoGloss(s){
  let out='', i=0;
  outer: while(i<s.length){
    for(const k of AUTO_KEYS){
      if(s.startsWith(k,i)){ out+=gloss(esc(k),k); i+=k.length; continue outer; }
    }
    out+=s[i++];
  }
  return out;
}
/* Dynasty label with inline pinyin (opt) + a tooltip carrying the reign dates. */
function dyn(name,opts){
  const t=TERMS[name];
  const label=(opts&&opts.py&&t)
    ? `${esc(name)} <span style="font-weight:600;opacity:.72;">${esc(t.py)}</span>`
    : esc(name);
  return gloss(label,name);
}

}
function hidePop(){ if(popEl) popEl.style.display='none'; }
function showPopAt(anchor,html){
  const p=popNode(); p.innerHTML=html; p.style.display='block';
  const r=anchor.getBoundingClientRect(), pw=p.offsetWidth, ph=p.offsetHeight, gap=8, m=10;

  p.style.left=left+'px'; p.style.top=top+'px';
}

function speak(text){

    const u=new SpeechSynthesisUtterance(text.replace(/[「」“”？，。！；：、]/g,' '));

/* ────────────────────────────  TOKENISER (the alignment contract)  ──────────
 * Walk `zh`; for each Han glyph consume the next syllable from `py`; punctuation
 * consumes nothing.  cats keys index into the Han-only sequence. */
const HAN=/[一-鿿]/;
function tokens(line){
  const syls=(line.py||'').split(/\s+/).filter(Boolean);
  const cats=line.cats||{};
  const out=[]; let k=0;
  for(const ch of (line.zh||'')){
    if(HAN.test(ch)){ out.push({ ch, py:syls[k]||'', cat:cats[k]||'', isPunct:false }); k++; }
    else { out.push({ ch, py:'', cat:'', isPunct:true }); }
  }
  return out;
}
const catColor = c => (CATS[c] ? CATS[c].color : '');

/* ────────────────────────────  RENDER HELPERS  ──────────────────────────── */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function styleStr(o){ return Object.entries(o).map(([k,v])=>k.replace(/[A-Z]/g,m=>'-'+m.toLowerCase())+':'+v).join(';'); }

function artifactChars(line, showPy, masked){
  return tokens(line).map(tk=>{
    const col=catColor(tk.cat);
    const ruby={ color: masked ? 'transparent' : (col||'inherit'), borderBottom: (!masked&&col)?('2px solid '+col):'none' };
    const rt={ fontFamily:"'Manrope',sans-serif", fontSize:'10px', fontWeight:600, letterSpacing:'0', color: masked ? 'transparent' : (col||'#A89A80') };
    const py=(showPy && !masked && !tk.isPunct) ? tk.py : '';
    return `<ruby style="${styleStr(ruby)}">${esc(tk.ch)}<rt style="${styleStr(rt)}">${esc(py)}</rt></ruby>`;
  }).join('');
}
function studyChars(line, showPy){
  return tokens(line).map(tk=>{
    const col=catColor(tk.cat);
    const ruby={ color: tk.cat?col:'#221D16', margin: tk.isPunct?'0':'0 1px', borderBottom: tk.cat?('2px solid '+col):'none', paddingBottom:'1px' };
    const rt={ fontFamily:"'Manrope',sans-serif", fontSize:'12.5px', fontWeight:600, letterSpacing:'.01em', color: col||'#A38C73', paddingBottom:'3px' };
    const py=(showPy && !tk.isPunct) ? tk.py : '';
    return `<ruby style="${styleStr(ruby)}">${esc(tk.ch)}<rt style="${styleStr(rt)}">${esc(py)}</rt></ruby>`;
  }).join('');
}
/* Which grammar roles actually appear in this line — drives a compact legend. */
function legendFor(line){
  const seen=new Set(Object.values(line.cats||{}));
  return [...seen].filter(c=>CATS[c]).map(c=>{
    const d=CATS[c];
    return `<span style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:#7A6F5C;"><i style="width:9px;height:9px;border-radius:2px;background:${d.color};display:inline-block;"></i>${d.tag} ${esc(d.cn)} · ${esc(d.en)}</span>`;
  }).join('');
}

function readerScreen(){
  const t=cur(), mode=state.mode, lines=t.lines, showPy=state.pyOn!==false;

  /* sub-bar */
  const segBase='border:none;cursor:pointer;font-weight:600;font-size:13.5px;padding:8px 16px;border-radius:999px;transition:.15s;white-space:nowrap;';
  const seg=(on)=> on ? segBase+'background:#B23A2B;color:#fff;box-shadow:0 6px 14px -8px rgba(178,58,43,.85);' : segBase+'background:transparent;color:#6E6452;';
  const styPy = showPy ? segBase+'background:#FBF6EC;color:#B23A2B;border:1px solid #E9C7C1;' : segBase+'background:transparent;color:#8A7F6B;border:1px solid #DCD0B8;';
  const subBar=`<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:12px clamp(18px,3.4vw,40px);flex-shrink:0;border-bottom:1px solid #E2D8C2;background:#F4ECDA;">
    <div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;">
      <span style="font-family:'Noto Serif SC',serif;font-weight:600;font-size:clamp(20px,2.4vw,26px);">《${esc(t.title)}》</span>
      <span style="font-family:'Newsreader',serif;font-style:italic;font-size:15px;color:#938976;">${esc(t.titleEn)}</span>
      <span style="font-size:12.5px;color:#A99C84;font-weight:600;">${esc(t.titlePy||'')}</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <button data-action="togglePy" style="${styPy}">拼音<span style="opacity:.62;font-weight:600;margin-left:6px;">${showPy?'On':'Off'}</span></button>
      <button data-legend="1" style="${segBase}background:transparent;color:#6E6452;border:1px solid #DCD0B8;">图例<span style="opacity:.62;font-weight:500;margin-left:6px;">Legend</span></button>
      <div style="display:inline-flex;background:#EAE0CB;border:1px solid #E2D8C2;border-radius:999px;padding:3px;gap:2px;">
        <button data-action="mode:read"   style="${seg(mode==='read')}">通读<span style="opacity:.65;font-weight:500;margin-left:5px;">Read</span></button>
        <button data-action="mode:study"  style="${seg(mode==='study')}">精读<span style="opacity:.65;font-weight:500;margin-left:5px;">Study</span></button>
        <button data-action="mode:recite" style="${seg(mode==='recite')}">背诵<span style="opacity:.65;font-weight:500;margin-left:5px;">Recite</span></button>
      </div>
    </div>
  </div>`;

  /* left: vertical artifact */
  const clauses=lines.map((ln,i)=>{
    const masked = mode==='recite' && !state.revealed[i];
    const selected = state.sel===i;
    let style='cursor:pointer;padding:1px 2px;border-radius:5px;';
    if(masked) style+='background:rgba(34,29,22,.14);color:transparent;box-shadow:inset 0 0 0 1px rgba(34,29,22,.05);border-radius:3px;';
    else if(selected && mode==='study') style+='background:rgba(178,58,43,.12);';
    return `<span data-action="clause:${i}" class="wy-clause" style="${style}">${artifactChars(ln,showPy,masked)}</span>`;
  }).join('');
  const leftHint = mode==='read' ? '点击任一句可朗读 · tap any line to hear it read aloud'
                 : mode==='study' ? '点击竖排原文，逐字注音 · tap a column to study it, character by character'
                 : '点击被遮住的句子以揭示 · tap a covered line to reveal it';
  const left=`<div style="flex:1 1 480px;min-width:300px;display:flex;flex-direction:column;">
    <div class="wy-scroll" style="flex:1;background:#F6EEDD;border:1px solid #E6DCC6;border-radius:16px;padding:clamp(22px,3vw,40px);display:flex;flex-direction:row-reverse;justify-content:flex-start;gap:clamp(20px,3vw,40px);align-items:flex-start;overflow-x:auto;box-shadow:inset 0 1px 0 rgba(255,255,255,.5);">
      <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:18px;padding-top:4px;">
        <div style="writing-mode:vertical-rl;text-orientation:upright;display:flex;gap:14px;">
          <span style="font-family:'Noto Serif SC',serif;font-weight:600;font-size:clamp(22px,2.6vw,30px);letter-spacing:4px;color:#221D16;">${esc(t.title)}</span>
          <span style="font-family:'Noto Serif SC',serif;font-weight:400;font-size:14px;letter-spacing:3px;color:#938976;">${esc(t.colophon)}</span>
        </div>
        <div style="text-align:center;line-height:1.3;">
          <div style="font-weight:700;font-size:12.5px;color:#5B5142;">${esc(t.titlePy||'')}</div>
          <div style="font-size:11.5px;color:#A99C84;font-family:'Newsreader',serif;font-style:italic;">${esc(t.titleEn)}</div>
        </div>
        <div style="width:46px;height:46px;border-radius:8px;background:#B23A2B;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif SC',serif;font-weight:700;font-size:26px;${SEAL_GRAD}">${esc(t.seal)}</div>
      </div>
      <div class="artifact" style="height:min(62vh,560px);font-family:'Noto Serif SC',serif;font-weight:500;font-size:clamp(22px,2.4vw,28px);line-height:2.5;letter-spacing:2px;color:#221D16;">${clauses}</div>
    </div>
    <div style="font-size:12.5px;color:#A99C84;text-align:center;margin-top:11px;font-family:'Newsreader',serif;font-style:italic;">${leftHint}</div>
  </div>`;

  /* right panel by mode */
  let right='';
  if(mode==='read')        right=contextPanel(t);
  else if(mode==='study')  right=studyPanel(t, showPy);
  else                     right=recitePanel(t);

  return `<div style="flex:1;display:flex;flex-direction:column;overflow:hidden;animation:wyIn .34s cubic-bezier(.22,.61,.36,1);">
    ${subBar}
    <div class="wy-scroll" style="flex:1;overflow:auto;display:flex;flex-wrap:wrap;align-items:stretch;gap:clamp(18px,2.4vw,32px);padding:clamp(18px,3vw,36px);">
      ${left}
      <div style="flex:1 1 360px;min-width:300px;max-width:560px;display:flex;flex-direction:column;gap:14px;">${right}</div>
    </div>
  </div>`;
}

      <p style="font-family:'Noto Serif SC',serif;font-size:17.5px;line-height:1.8;color:#3A332A;margin:0;">${esc(cl.today)}</p>
      <div style="display:flex;align-items:center;gap:9px;margin:18px 0 10px;padding-top:16px;border-top:1px solid #EDE3CE;">
        <span style="width:24px;height:24px;border-radius:6px;background:#2E3A44;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;">EN</span>
        <span style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:#938976;">idiomatic English</span>
      </div>
      <p style="font-family:'Newsreader',serif;font-size:18px;line-height:1.62;color:#3A332A;margin:0;">${esc(cl.en)}</p>
    </div>
    <div style="background:#FBF6EC;border:1px solid #E2D8C2;border-radius:16px;padding:clamp(18px,2.2vw,24px);">
      <span style="display:inline-block;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;color:#B23A2B;background:rgba(178,58,43,.1);border-radius:7px;padding:3px 9px;margin-bottom:8px;">字词 · Words that shift</span>
      <div>${notes||'<p style="font-family:\'Newsreader\',serif;font-style:italic;color:#A99C84;margin:8px 0 0;">No tricky words in this line.</p>'}</div>
    </div>
    <div style="font-size:12.5px;color:#A99C84;text-align:center;font-family:'Newsreader',serif;font-style:italic;">第 ${sel+1} 句，共 ${t.lines.length} 句 · use the lines on the left to move through</div>`;
}

function recitePanel(t){
  const lines=t.lines;
  let targetIdx=-1;
  for(let i=0;i<lines.length;i++){ if(!state.revealed[i]){ targetIdx=i; break; } }
  const recDone=lines.filter((_,i)=>state.revealed[i]).length;
  const recTotal=lines.length;
  const recPct=recTotal? Math.round(recDone/recTotal*100):0;
  const cue=targetIdx>=0? lines[targetIdx]:null;

  const cueCard = cue ? `<div style="background:#FBF6EC;border:1px solid #E2D8C2;border-radius:16px;padding:clamp(20px,2.4vw,28px);">
      <span style="display:inline-block;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;color:#938976;margin-bottom:12px;">提示 · the next line means…</span>
      <p style="font-family:'Noto Serif SC',serif;font-size:18px;line-height:1.8;color:#3A332A;margin:0;">${esc(cue.today)}</p>
      <p style="font-family:'Newsreader',serif;font-size:17px;line-height:1.6;color:#8A7F6B;margin:12px 0 0;">${esc(cue.en)}</p>
      <p style="font-size:13px;color:#B23A2B;font-weight:600;margin:18px 0 0;font-family:'Newsreader',serif;font-style:italic;">Recall the 文言, then tap the covered line on the left to check.</p>
    </div>`
    : (recTotal>0 ? `<div style="background:#FBF6EC;border:1px solid #E2D8C2;border-radius:16px;padding:clamp(22px,2.6vw,30px);text-align:center;">
        <div style="font-family:'Noto Serif SC',serif;font-size:30px;color:#B23A2B;">✦</div>
        <p style="font-family:'Noto Serif SC',serif;font-size:19px;margin:8px 0 4px;">全篇通背</p>
        <p style="font-family:'Newsreader',serif;font-style:italic;color:#8A7F6B;margin:0;">Every line recalled. The whole piece is yours.</p>
      </div>` : '');

  return `<div style="background:#FBF6EC;border:1px solid #E2D8C2;border-radius:16px;padding:clamp(20px,2.4vw,28px);">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;">
        <span style="display:inline-block;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;color:#B23A2B;background:rgba(178,58,43,.1);border-radius:7px;padding:3px 9px;">背诵 · Recall</span>
        <span style="font-family:'Newsreader',serif;font-style:italic;font-size:14px;color:#938976;">${recDone} / ${recTotal} revealed</span>
      </div>
      <div style="height:8px;border-radius:999px;background:#EAE0CB;overflow:hidden;">
        <i style="display:block;height:100%;width:${recPct}%;background:#B23A2B;border-radius:999px;transition:width .4s cubic-bezier(.22,.61,.36,1);"></i>
      </div>
    </div>
    ${cueCard}
    <div style="display:flex;gap:10px;">
      <button data-action="revealAll" class="wy-ghost" style="flex:1;border:1px solid #E2D8C2;background:#FBF6EC;color:#5B5142;font-weight:600;font-size:14px;padding:12px;border-radius:12px;cursor:pointer;transition:.15s;">全部显示 Show all</button>
      <button data-action="resetRecite" class="wy-solid" style="flex:1;border:1px solid #B23A2B;background:#B23A2B;color:#fff;font-weight:600;font-size:14px;padding:12px;border-radius:12px;cursor:pointer;transition:.15s;">重来 Reset</button>
    </div>`;
}

/* ────────────────────────────  MOUNT  ──────────────────────────── */
function render(){
  hidePop();
  const body = state.screen==='home' ? homeScreen() : readerScreen();
  document.getElementById('app').innerHTML =
    `<div style="height:100vh;display:flex;flex-direction:column;overflow:hidden;background:#EFE7D6;">${topBar()}${body}</div>`;
}

document.getElementById('app').addEventListener('click', e=>{
  const term=e.target.closest('[data-gloss]');
  if(term){ e.stopPropagation(); showPopAt(term, termHtml(term.getAttribute('data-gloss'))); return; }
  const leg=e.target.closest('[data-legend]');
  if(leg){ e.stopPropagation(); showPopAt(leg, legendHtml()); return; }
  const el=e.target.closest('[data-action]');
  if(!el){ hidePop(); return; }
  const a=el.getAttribute('data-action');
  if(a==='goHome') goHome();
  else if(a==='togglePy') togglePy();
  else if(a==='speakClause') speak(cur().lines[state.sel==null?0:state.sel].zh);
  else if(a==='revealAll') revealAll();
  else if(a==='resetRecite') resetRecite();
  else if(a.startsWith('open:')) openText(a.slice(5));
  else if(a.startsWith('mode:')) setMode(a.slice(5));
  else if(a.startsWith('clause:')) clickClause(parseInt(a.slice(7),10));
});

/* Dismiss tooltips on any outside click, scroll, resize or Escape. */
document.addEventListener('click', hidePop);
window.addEventListener('scroll', hidePop, true);
window.addEventListener('resize', hidePop);
document.addEventListener('keydown', e=>{ if(e.key==='Escape') hidePop(); });

/* Dev guard for the alignment contract: one syllable per Han glyph (§3). */
function validate(){
  let bad=0;
  for(const id in DATA){
    DATA[id].lines.forEach((ln,i)=>{
      const han=[...(ln.zh||'')].filter(c=>HAN.test(c)).length;
      const syl=(ln.py||'').split(/\s+/).filter(Boolean).length;
      if(han!==syl){ bad++; console.warn(`[reader] alignment mismatch ${id} line ${i}: ${han} Han vs ${syl} pinyin — "${ln.zh}"`); }
      for(const k in (ln.cats||{})){ if(+k>=han) console.warn(`[reader] cat index out of range ${id} line ${i}: ${k}`); }
    });
  }
  if(!bad) console.info('[reader] pinyin alignment OK for all lines');
}

validate();
render();

})();
</script>
